<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vengeance Utilities - UpperEchelon</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🔮</text></svg>">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --grid-line: rgba(255, 255, 255, 0.03);
            --card-bg: rgba(18, 18, 20, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            
            /* Theme Variables (Default: Purple) */
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.25);
            --bg-grad-1: #090514;
            --bg-grad-2: #0b0b0c;

            --stat-green: rgba(52, 211, 153, 0.1);
            --stat-pink: rgba(244, 63, 94, 0.1);
            --stat-yellow: rgba(251, 191, 36, 0.1);
            --stat-blue: rgba(59, 130, 246, 0.1);
        }

        /* THEME STYLES */
        body.theme-v-red {
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.3);
            --bg-grad-1: #1a0505;
            --bg-grad-2: #0b0b0c;
        }
        body.theme-v-green {
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.25);
            --bg-grad-1: #03140e;
            --bg-grad-2: #0b0b0c;
        }
        body.theme-v-void {
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --bg-grad-1: #111113;
            --bg-grad-2: #050505;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
                linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-size: 40px 40px, 40px 40px, 400% 400%;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%, 0% 0%, 0% 50%; }
            50% { background-position: 0% 0%, 0% 0%, 100% 50%; }
            100% { background-position: 0% 0%, 0% 0%, 0% 50%; }
        }

        .theme-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .theme-btn:hover { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .theme-dropdown {
            position: absolute;
            top: 45px;
            right: 0;
            background: #121214;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            width: 150px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .theme-dropdown.show { display: flex; }

        .theme-opt {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 8px 12px;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .theme-opt:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }

        /* Bento Grid Container */
        .bento-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 900px) {
            .bento-container {
                grid-template-columns: 300px 1fr 300px;
                align-items: stretch;
            }
            .bento-container > .card, 
            .bento-container > .main-content, 
            .bento-container > .stats-container {
                min-height: 330px; /* Erzwingt eine einheitliche und perfekt symmetrische Höhe */
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
        }

        /* SPALTE 1: Profil & Socials */
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .avatar-wrapper::before {
            content: '';
            position: absolute;
            width: 106%;
            height: 106%;
            border-radius: 28px;
            background: linear-gradient(90deg, var(--accent), transparent, var(--accent));
            animation: rotateBorder 4s linear infinite;
            z-index: 1;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .avatar {
            width: 94%;
            height: 94%;
            border-radius: 26px;
            object-fit: cover;
            background: #161619;
            padding: 2px;
            z-index: 2;
        }

        .username {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px var(--accent-glow);
            flex-shrink: 0;
        }

        .bio {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        /* Scrollbereich für Links schützt das Layout vor Verzerrungen */
        .links-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
            max-height: 130px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .links-list::-webkit-scrollbar { width: 4px; }
        .links-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .social-link {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .social-link i { width: 20px; font-size: 1rem; margin-right: 10px; color: var(--text-muted); }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* SPALTE 2: Musik-Player & Widgets */
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        .music-player { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
        .track-info-container { display: flex; gap: 20px; align-items: center; }
        
        .album-art {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .track-details { flex-grow: 1; }
        .track-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
        .track-artist { color: var(--text-muted); font-size: 0.9rem; }
        .player-controls { display: flex; flex-direction: column; gap: 8px; }
        .progress-bar-container { width: 100%; }
        
        .time-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: relative; cursor: pointer; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--text-main); box-shadow: 0 0 8px var(--text-main); border-radius: 3px; }

        .control-buttons { display: flex; align-items: center; justify-content: center; gap: 24px; }
        .volume-container { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--text-muted); font-size: 0.85rem; }
        .volume-slider { -webkit-appearance: none; width: 80px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--text-main); }

        .btn-control { background: none; border: none; color: var(--text-muted); font-size: 1.1rem; cursor: pointer; transition: color 0.2s; }
        .btn-control:hover { color: var(--text-main); }
        .btn-play { width: 38px; height: 38px; background: var(--text-main); color: var(--bg-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; }

        /* Discord Widget Box */
        .discord-guild-box {
            display: flex; align-items: center; justify-content: space-between; background: rgba(88, 101, 242, 0.03); border: 1px solid rgba(88, 101, 242, 0.08); padding: 12px 16px; border-radius: 12px;
        }

        .discord-guild-info { display: flex; align-items: center; gap: 12px; }
        .discord-icon { width: 40px; height: 40px; border-radius: 10px; background: #1e1e22; object-fit: cover; }
        .discord-stats { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
        .btn-discord-join { background: #5865F2; color: white; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; font-weight: 600; }

        /* SPALTE 3: Stats Stacks */
        .stats-container { display: flex; flex-direction: column; gap: 12px; justify-content: space-between; }
        .stat-card { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; border-radius: 14px; height: 100%; border: 1px solid rgba(255,255,255,0.01); }

        .stat-card.green { background: var(--stat-green); }
        .stat-card.pink { background: var(--stat-pink); }
        .stat-card.yellow { background: var(--stat-yellow); }
        .stat-card.blue { background: var(--stat-blue); }

        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; }
        .stat-value { font-size: 1.6rem; font-weight: 800; font-family: 'Georgia', serif; }

        /* ZEILE UNTEN */
        .status-banner { grid-column: 1 / -1; display: flex; align-items: center; gap: 15px; font-size: 0.9rem; padding: 16px 24px; margin-top: 10px; }
        .status-dot { width: 10px; height: 10px; background: #94a3b8; border-radius: 50%; position: relative; }
        .status-dot.online { background: #22c55e; }
        .status-dot.online::after { content: ''; position: absolute; width: 100%; height: 100%; background: inherit; border-radius: inherit; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }
        .footer-text { grid-column: 1 / -1; text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.15); letter-spacing: 2px; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="theme-selector">
        <button class="theme-btn" id="theme-trigger"><i class="fas fa-palette"></i> Themes</button>
        <div class="theme-dropdown" id="theme-menu">
            <button class="theme-opt" data-theme="purple">Ametyst</button>
            <button class="theme-opt" data-theme="red">Vengeance</button>
            <button class="theme-opt" data-theme="green">Cyber</button>
            <button class="theme-opt" data-theme="void">Void</button>
        </div>
    </div>

    <!-- Unsichtbarer YouTube Player-Container -->
    <div id="youtube-player" style="display: none;"></div>

    <div class="bento-container">
        
        <div class="card profile-card">
            <div class="avatar-wrapper">
                <img id="avatar" src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
            </div>
            <h1 id="username" class="username">Loading...</h1>
            <p id="bio" class="bio">...</p>
            <div id="links-container" class="links-list"></div>
        </div>

        <div class="main-content">
            <div class="card music-player">
                <div class="track-info-container">
                    <img id="yt-cover" src="https://via.placeholder.com/150" alt="Album Art" class="album-art">
                    <div class="track-details">
                        <div id="yt-title" class="track-title">Loading...</div>
                        <div id="yt-artist" class="track-artist">Silence</div>
                    </div>
                </div>
                
                <div class="player-controls">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-timeline">
                            <div id="yt-progress" class="progress-fill"></div>
                        </div>
                        <div class="time-info">
                            <span id="yt-current-time">0:00</span>
                            <span id="yt-duration">0:00</span>
                        </div>
                    </div>
                    
                    <div class="control-buttons">
                        <button class="btn-control" id="prev-btn"><i class="fas fa-backward"></i></button>
                        <button class="btn-control btn-play" id="play-pause-btn"><i class="fas fa-play"></i></button>
                        <button class="btn-control" id="next-btn"><i class="fas fa-forward"></i></button>
                    </div>

                    <div class="volume-container">
                        <i class="fas fa-volume-down"></i>
                        <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50">
                    </div>
                </div>

                <div class="discord-guild-box">
                    <div class="discord-guild-info">
                        <img id="discord-guild-icon" src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Server Icon" class="discord-icon">
                        <div>
                            <div id="discord-guild-name" style="font-weight: 600; font-size: 0.9rem;">Mein Discord Server</div>
                            <div id="discord-guild-stats" class="discord-stats"><i class="fas fa-circle" style="color: #22c55e; font-size: 0.6rem;"></i> 0 Online</div>
                        </div>
                    </div>
                    <a id="discord-guild-invite" href="#" target="_blank" class="btn-discord-join">Join <i class="fas fa-sign-in-alt"></i></a>
                </div>
            </div>
        </div>

        <div class="stats-container">
            <div class="card stat-card green">
                <div class="stat-label">Years Coding</div>
                <div id="stat-1" class="stat-value">0+</div>
            </div>
            <div class="card stat-card pink">
                <div class="stat-label">Languages</div>
                <div id="stat-2" class="stat-value">0+</div>
            </div>
            <div class="card stat-card yellow">
                <div class="stat-label">Projects Built</div>
                <div id="stat-3" class="stat-value">0+</div>
            </div>
            <div class="card stat-card blue">
                <div class="stat-label">Profile Views</div>
                <div id="stat-4" class="stat-value">0</div>
            </div>
        </div>

        <div class="card status-banner">
            <div class="status-dot online"></div>
            <span id="discord-presence">Offline — Nothing going on right now.</span>
        </div>

        <div class="footer-text">Handcrafted from scratch &bull; Vengeance Utilities</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pdyrfnbjegsyjmcmbqck.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XfgU_toGSxKo2eM810q59w_qJt_HAO0';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let playlist = [];
        let currentSongIndex = 0;
        let ytPlayer;

        // ANIMIERTER TAB TEXT
        let titleText = " Vengeance Utilities - UpperEchelon dev ";
        setInterval(() => {
            titleText = titleText.substring(1) + titleText.substring(0, 1);
            document.title = titleText;
        }, 300);

        // THEME ENGINE
        const trigger = document.getElementById('theme-trigger');
        const menu = document.getElementById('theme-menu');
        trigger.addEventListener('click', () => menu.classList.toggle('show'));
        
        document.querySelectorAll('.theme-opt').forEach(opt => {
            opt.addEventListener('click', () => {
                const theme = opt.getAttribute('data-theme');
                document.body.className = ''; 
                if(theme !== 'purple') document.body.classList.add('theme-v-' + theme);
                localStorage.setItem('vengeance-theme', theme);
                menu.classList.remove('show');
            });
        });
        const savedTheme = localStorage.getItem('vengeance-theme');
        if(savedTheme && savedTheme !== 'purple') document.body.classList.add('theme-v-' + savedTheme);

        // LOAD LIVE DATA
        async function loadWebsiteData() {
            try {
                const { data: profile } = await sbClient.from('profile').select('*').eq('id', 1).maybeSingle();
                if (profile) {
                    document.getElementById('username').innerText = profile.username || 'Unknown';
                    document.getElementById('bio').innerText = profile.bio || '';
                    if (profile.avatar_url) document.getElementById('avatar').src = profile.avatar_url;
                }

                // ANTI-SPAM VIEW COUNTER
                const { data: stats } = await sbClient.from('stats').select('*').eq('id', 1).maybeSingle();
                if (stats) {
                    let currentViews = stats.views || 0;
                    if (!sessionStorage.getItem('vengeance_visited')) {
                        sessionStorage.setItem('vengeance_visited', 'true');
                        currentViews += 1;
                        await sbClient.from('stats').update({ views: currentViews }).eq('id', 1);
                    }
                    document.getElementById('stat-4').innerText = currentViews;
                    document.getElementById('stat-1').innerText = stats.years_coding || '0+';
                    document.getElementById('stat-2').innerText = stats.languages || '0+';
                    document.getElementById('stat-3').innerText = stats.projects || '0+';
                }

                const { data: discord } = await sbClient.from('discord_config').select('*').eq('id', 1).maybeSingle();
                if (discord && discord.user_id) {
                    fetch(`https://api.lanyard.rest/v1/users/${discord.user_id}`)
                        .then(res => res.json())
                        .then(response => {
                            if (response.success && response.data) {
                                const data = response.data;
                                const statusDot = document.querySelector('.status-dot');
                                const statusText = document.getElementById('discord-presence');
                                statusDot.className = 'status-dot ' + (data.discord_status !== 'offline' ? 'online' : '');
                                if (data.listening_to_spotify && data.spotify) {
                                    statusText.innerText = `Listening to Spotify: ${data.spotify.song} - ${data.spotify.artist}`;
                                } else if (data.activities && data.activities.length > 0) {
                                    statusText.innerText = `Playing: ${data.activities[0].name}`;
                                } else {
                                    statusText.innerText = data.discord_status.toUpperCase() + ` — Active on Discord.`;
                                }
                            }
                        }).catch(err => console.log(err));
                }

                // ECHTES ICON ÜBER DISCORDS WIDGET-JSON BEZIEHEN
                if(discord && discord.server_id) {
                    fetch(`https://discord.com/api/guilds/${discord.server_id}/widget.json`)
                        .then(res => res.json())
                        .then(data => {
                            if(data) {
                                document.getElementById('discord-guild-name').innerText = data.name;
                                document.getElementById('discord-guild-stats').innerHTML = `<i class="fas fa-circle" style="color: #22c55e; font-size: 0.6rem;"></i> ${data.presence_count} Online`;
                                document.getElementById('discord-guild-invite').href = data.instant_invite;
                                
                                // Das Widget liefert uns die exakte ID des verschlüsselten Icon-Hashes. 
                                // Wir fragen das Asset direkt im CDN als echtes Quadrat-Bild ab (unterstützt GIFs).
                                if(data.id) {
                                    // Wir nutzen ein alternatives Template-Routing, um Cross-Origin Blockaden zu vermeiden
                                    document.getElementById('discord-guild-icon').src = `https://discordapp.com/api/guilds/${discord.server_id}/embed.png?style=banner3`;
                                }
                            }
                        }).catch(() => {});
                }

                const { data: dbPlaylist } = await sbClient.from('youtube_playlist').select('*');
                if (dbPlaylist && dbPlaylist.length > 0) {
                    playlist = dbPlaylist.map(song => ({
                        title: song.song_title, artist: song.artist, id: song.youtube_id, cover: song.cover_url
                    }));
                } else {
                    playlist = [{ title: "No Songs", artist: "Empty DB", id: "7qFfFVSerQo", cover: "https://img.youtube.com/vi/7qFfFVSerQo/hqdefault.jpg" }];
                }

                const { data: dbLinks } = await sbClient.from('links').select('*');
                const linksContainer = document.getElementById('links-container');
                if (dbLinks && dbLinks.length > 0 && linksContainer) {
                    linksContainer.innerHTML = '';
                    dbLinks.forEach(link => {
                        const a = document.createElement('a');
                        a.href = link.url; a.target = '_blank'; a.className = 'social-link';
                        a.innerHTML = `<i class="${link.icon}"></i> ${link.name}`;
                        linksContainer.appendChild(a);
                    });
                }

                updatePlayerUI();
                
                // Triggert das Laden der YouTube-Skripte erst, wenn die Playlist-Daten asynchron bereitstehen
                if(playlist.length > 0 && typeof YT !== 'undefined' && YT.Player) {
                    onYouTubeIframeAPIReady();
                }

            } catch (err) { console.error(err); }
        }

        // --- YOUTUBE CONFIG ---
        function onYouTubeIframeAPIReady() {
            if(playlist.length === 0) return;
            ytPlayer = new YT.Player('youtube-player', {
                height: '0', width: '0',
                videoId: playlist[currentSongIndex]?.id || '',
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            ytPlayer.setVolume(document.getElementById('volume-slider').value);

            document.getElementById('play-pause-btn').addEventListener('click', function() {
                if (!ytPlayer || !playlist[currentSongIndex]?.id) return;
                const state = ytPlayer.getPlayerState();
                const icon = this.querySelector('i');
                if (state === YT.PlayerState.PLAYING) {
                    ytPlayer.pauseVideo(); icon.className = 'fas fa-play';
                } else {
                    ytPlayer.playVideo(); icon.className = 'fas fa-pause';
                }
            });

            document.getElementById('next-btn').addEventListener('click', () => changeSong(1));
            document.getElementById('prev-btn').addEventListener('click', () => changeSong(-1));
            
            document.getElementById('progress-timeline').addEventListener('click', function(e) {
                if (!ytPlayer || !playlist[currentSongIndex]?.id) return;
                const rect = this.getBoundingClientRect();
                const clickPosition = (e.clientX - rect.left) / rect.width;
                const totalDuration = ytPlayer.getDuration();
                if (totalDuration > 0) ytPlayer.seekTo(totalDuration * clickPosition, true);
            });

            document.getElementById('volume-slider').addEventListener('input', function() {
                if (ytPlayer) ytPlayer.setVolume(this.value);
            });
            
            setInterval(() => {
                if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function' && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    const current = ytPlayer.getCurrentTime();
                    const total = ytPlayer.getDuration();
                    if (total > 0) document.getElementById('yt-progress').style.width = (current / total) * 100 + '%';
                    const formatTime = (time) => Math.floor(time / 60) + ':' + ('0' + Math.floor(time % 60)).slice(-2);
                    document.getElementById('yt-current-time').innerText = formatTime(current);
                    document.getElementById('yt-duration').innerText = formatTime(total);
                }
            }, 1000);
        }

        function changeSong(direction) {
            if (playlist.length <= 1 && !playlist[0]?.id) return;
            currentSongIndex += direction;
            if (currentSongIndex >= playlist.length) currentSongIndex = 0;
            if (currentSongIndex < 0) currentSongIndex = playlist.length - 1;
            ytPlayer.loadVideoById(playlist[currentSongIndex].id);
            updatePlayerUI();
            document.querySelector('#play-pause-btn i').className = 'fas fa-pause';
        }

        function updatePlayerUI() {
            if (!playlist[currentSongIndex]) return;
            document.getElementById('yt-title').innerText = playlist[currentSongIndex].title;
            document.getElementById('yt-artist').innerText = playlist[currentSongIndex].artist;
            document.getElementById('yt-progress').style.width = '0%';
            
            const imgElement = document.getElementById('yt-cover');
            const targetCover = playlist[currentSongIndex].cover;

            if (targetCover && targetCover.includes('maxresdefault.jpg')) {
                imgElement.src = targetCover;
                imgElement.onerror = function() {
                    this.src = targetCover.replace('maxresdefault.jpg', 'hqdefault.jpg');
                    this.onerror = null; 
                };
            } else {
                imgElement.src = targetCover || "https://via.placeholder.com/150";
            }
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) changeSong(1); 
        }

        window.addEventListener('DOMContentLoaded', loadWebsiteData);
    </script>
</body>
</html>
