<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vengeance Utilities | Bio</title>
    <link id="favicon" rel="icon" type="image/png" href="https://via.placeholder.com/32">
    
    <style>
        :root {
            --bg-color: #050507;
            --card-bg: rgba(24, 24, 27, 0.65);
            --accent-color: #a855f7;
            --text-color: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: rgba(39, 39, 42, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Animierter Hintergrund im e-z.bio Stil */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.12), transparent 60%);
            z-index: -1;
        }

        .container { 
            width: 100%; 
            max-width: 540px; 
            text-align: center; 
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem 2rem;
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 50px rgba(168, 85, 247, 0.05);
        }
        
        .hidden { display: none !important; }

        /* Profil-Bereich */
        .profile-img { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 2px solid var(--accent-color); 
            object-fit: cover; 
            margin-bottom: 1.25rem; 
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.45); 
            transition: transform 0.3s ease;
        }
        .profile-img:hover { transform: scale(1.05); }

        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.35rem; letter-spacing: -0.5px; }
        .bio { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.5; }

        /* Links & Buttons */
        .links-container { display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 2rem; }
        .bio-link { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: rgba(39, 39, 42, 0.4); 
            color: var(--text-color); 
            text-decoration: none; 
            padding: 1rem; 
            border-radius: 14px; 
            border: 1px solid var(--border-color); 
            font-weight: 600; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .bio-link:hover { 
            border-color: var(--accent-color); 
            background-color: rgba(168, 85, 247, 0.08);
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.15); 
        }

        /* Video Player Modul */
        .video-player-container {
            margin-top: 1.5rem;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #000;
            display: none;
        }
        video { width: 100%; display: block; max-height: 260px; object-fit: cover; }

        #status-msg { color: var(--text-muted); font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="loading-profile" class="container">
        <p id="status-msg">Vengeance Utilities wird geladen...</p>
    </div>

    <div id="main-profile" class="container hidden">
        <img id="user-avatar" class="profile-img" src="" alt="Logo">
        <h1 id="user-name">Vengeance Utilities</h1>
        <p id="user-bio" class="bio"></p>

        <div class="links-container">
            <a id="link-github" href="#" target="_blank" class="bio-link hidden">GitHub Profile</a>
            <a id="link-discord" href="#" target="_blank" class="bio-link hidden">Discord Server</a>
        </div>

        <div id="video-box" class="video-player-container">
            <video id="bg-video" controls loop playsinline></video>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = "https://pdyrfnbjegsyjmcmbqck.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_XfgU_toGSxKo2eM810q59w_qJt_HAO0";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadBio() {
            const { data, error } = await supabase.from('user_bios').select('*').limit(1).single();

            if (error || !data) {
                document.getElementById('status-msg').innerText = "Profil-Daten konnten nicht geladen werden.";
                return;
            }

            // Daten setzen
            document.getElementById('user-name').innerText = data.display_name || "Vengeance Utilities";
            document.getElementById('user-bio').innerText = data.bio_text || '';
            
            // Avatar & Favicon auf das gleiche Bild setzen
            if (data.avatar_url) {
                document.getElementById('user-avatar').src = data.avatar_url;
                document.getElementById('favicon').href = data.avatar_url;
            }

            // Links aktivieren
            if (data.github_link) {
                const gh = document.getElementById('link-github');
                gh.href = data.github_link;
                gh.classList.remove('hidden');
            }
            if (data.discord_link) {
                const dc = document.getElementById('link-discord');
                dc.href = data.discord_link;
                dc.classList.remove('hidden');
            }

            // Video einbinden
            if (data.video_url) {
                const videoBox = document.getElementById('video-box');
                const videoElement = document.getElementById('bg-video');
                videoElement.src = data.video_url;
                videoBox.style.display = 'block';
                
                // Versuche Autoplay mit Ton (Wird oft vom Browser gedrosselt, bis Interaktion erfolgt)
                videoElement.muted = false;
                videoElement.play().catch(() => {
                    console.log("Autoplay blockiert. User muss erst interagieren.");
                });
            }

            document.getElementById('loading-profile').classList.add('hidden');
            document.getElementById('main-profile').classList.remove('hidden');
        }

        loadBio();
    </script>
</body>
</html>
