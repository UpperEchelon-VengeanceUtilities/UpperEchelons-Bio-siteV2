<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vengeance Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --grid-line: rgba(255, 255, 255, 0.03);
            --card-bg: rgba(18, 18, 20, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-purple: #7c3aed;
            
            /* Stats Card Colors (angepasst aus dem Screenshot) */
            --stat-green: rgba(52, 211, 153, 0.1);
            --stat-pink: rgba(244, 63, 94, 0.1);
            --stat-yellow: rgba(251, 191, 36, 0.1);
            --stat-blue: rgba(59, 130, 246, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Bento Grid Container */
        .bento-container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 900px) {
            .bento-container {
                grid-template-columns: 300px 1fr 300px;
                grid-template-rows: auto auto;
            }
        }

        /* Basis Card Styling */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* SPALTE 1: Profil & Socials */
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            object-fit: cover;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            padding: 4px;
        }

        .username {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .bio {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .links-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .social-link i {
            width: 24px;
            font-size: 1.1rem;
            margin-right: 12px;
            color: var(--text-muted);
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        /* SPALTE 2: Musik-Player & Widgets */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .music-player {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .track-info-container {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .album-art {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .track-details {
            flex-image: 1;
        }

        .track-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .track-artist {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Player Controls */
        .player-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-container {
            width: 100%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--text-main);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-top: 5px;
        }

        .btn-control {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-control:hover {
            color: var(--text-main);
        }

        .btn-play {
            width: 42px;
            height: 42px;
            background: var(--text-main);
            color: var(--bg-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .btn-play:hover {
            transform: scale(1.05);
            color: var(--bg-color);
        }

        /* Discord Widget Box */
        .discord-guild-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(88, 101, 242, 0.05);
            border: 1px solid rgba(88, 101, 242, 0.1);
            padding: 16px;
            border-radius: 12px;
        }

        .discord-guild-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .discord-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .discord-stats {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-discord-join {
            background: #5865F2;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-discord-join:hover {
            background: #4752c4;
        }

        /* SPALTE 3: Stats Cards Stacks */
        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stat-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .stat-card.green { background: var(--stat-green); border-color: rgba(52, 211, 153, 0.1); }
        .stat-card.pink { background: var(--stat-pink); border-color: rgba(244, 63, 94, 0.1); }
        .stat-card.yellow { background: var(--stat-yellow); border-color: rgba(251, 191, 36, 0.1); }
        .stat-card.blue { background: var(--stat-blue); border-color: rgba(59, 130, 246, 0.1); }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Georgia', serif; 
        }

        /* ZEILE UNTEN: Discord Status Banner */
        .status-banner {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            padding: 16px 24px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #94a3b8;
            border-radius: 50%;
            position: relative;
        }

        .status-dot.online { background: #22c55e; }
        .status-dot.online::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: inherit;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .footer-text {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Unsichtbarer YouTube Player -->
    <div id="youtube-player" style="display: none;"></div>

    <div class="bento-container">
        
        <div class="card profile-card">
            <div class="avatar-wrapper">
                <img id="avatar" src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
            </div>
            <h1 id="username" class="username">Loading...</h1>
            <p id="bio" class="bio">...</p>
            
            <div id="links-container" class="links-list">
                <!-- Dynamische Links kommen hier rein -->
            </div>
        </div>

        <div class="main-content">
            <div class="card music-player">
                <div class="track-info-container">
                    <img id="yt-cover" src="https://via.placeholder.com/150" alt="Album Art" class="album-art">
                    <div class="track-details">
                        <div id="yt-title" class="track-title">Loading...</div>
                        <div id="yt-artist" class="track-artist">Silence</div>
                    </div>
                </div>
                
                <div class="player-controls">
                    <div class="progress-bar-container">
                        <div class="progress-bar">
                            <div id="yt-progress" class="progress-fill"></div>
                        </div>
                        <div class="time-info">
                            <span id="yt-current-time">0:00</span>
                            <span id="yt-duration">0:00</span>
                        </div>
                    </div>
                    <div class="control-buttons">
                        <button class="btn-control" id="prev-btn"><i class="fas fa-backward"></i></button>
                        <button class="btn-control btn-play" id="play-pause-btn"><i class="fas fa-play"></i></button>
                        <button class="btn-control" id="next-btn"><i class="fas fa-forward"></i></button>
                    </div>
                    <!-- Liste der Songs -->
                    <div id="song-list" style="margin-top: 15px; font-size: 0.85rem; color: var(--text-gray);">
                        <!-- Wird später per JS befüllt -->
                    </div>
                </div>

                <div class="discord-guild-box">
                    <div class="discord-guild-info">
                        <img src="https://via.placeholder.com/40" alt="Server Icon" class="discord-icon">
                        <div>
                            <div style="font-weight: 600; font-size: 0.9rem;">Mein Discord Server</div>
                            <div class="discord-stats"><i class="fas fa-circle" style="color: #22c55e; font-size: 0.6rem;"></i> 16 Online &bull; 106 Members</div>
                        </div>
                    </div>
                    <a href="#" class="btn-discord-join">Join <i class="fas fa-sign-in-alt"></i></a>
                </div>
            </div>
        </div>

        <div class="stats-container">
            <div class="card stat-card green">
                <div class="stat-label">Years Coding</div>
                <div id="stat-1" class="stat-value">0+</div>
            </div>
            <div class="card stat-card pink">
                <div class="stat-label">Languages</div>
                <div id="stat-2" class="stat-value">0+</div>
            </div>
            <div class="card stat-card yellow">
                <div class="stat-label">Projects Built</div>
                <div id="stat-3" class="stat-value">0+</div>
            </div>
            <div class="card stat-card blue">
                <div class="stat-label">Profile Views</div>
                <div id="stat-4" class="stat-value">0</div>
            </div>
        </div>

        <div class="card status-banner">
            <div class="status-dot online"></div>
            <span id="discord-presence">Offline — Nothing going on right now.</span>
        </div>

        <div class="footer-text">Handcrafted from scratch &bull; Vengeance Utilities</div>
    </div>

    <script>
        // --- 1. YOUTUBE PLAYER LOGIK ---
        
        // Platzhalter-Playlist (Ersetzen wir später mit den Supabase-Daten)
        const playlist = [
            { title: "Song 1", artist: "Artist A", id: "dQw4w9WgXcQ", cover: "https://via.placeholder.com/150" },
            { title: "Song 2", artist: "Artist B", id: "3JZ_D3ELwOQ", cover: "https://via.placeholder.com/150" }
        ];
        
        let currentSongIndex = 0;
        let ytPlayer;

        // Wird von der YouTube API aufgerufen, sobald sie geladen ist
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '0', 
                width: '0',
                videoId: playlist[currentSongIndex].id,
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
            updatePlayerUI();
        }

        function onPlayerReady(event) {
            // Play/Pause Button
            document.getElementById('play-pause-btn').addEventListener('click', function() {
                const state = ytPlayer.getPlayerState();
                const icon = this.querySelector('i');
                if (state === YT.PlayerState.PLAYING) {
                    ytPlayer.pauseVideo();
                    icon.className = 'fas fa-play';
                } else {
                    ytPlayer.playVideo();
                    icon.className = 'fas fa-pause';
                }
            });

            // Next / Prev Buttons
            document.getElementById('next-btn').addEventListener('click', () => changeSong(1));
            document.getElementById('prev-btn').addEventListener('click', () => changeSong(-1));
            
            // Progress Bar Update Loop (jede Sekunde)
            setInterval(() => {
                if (ytPlayer && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
                    const current = ytPlayer.getCurrentTime();
                    const total = ytPlayer.getDuration();
                    
                    // Verhindert NaN Fehler ganz am Anfang
                    if (total > 0) {
                        document.getElementById('yt-progress').style.width = (current / total) * 100 + '%';
                    }
                    
                    const formatTime = (time) => Math.floor(time / 60) + ':' + ('0' + Math.floor(time % 60)).slice(-2);
                    document.getElementById('yt-current-time').innerText = formatTime(current);
                    document.getElementById('yt-duration').innerText = formatTime(total);
                }
            }, 1000);
        }

        function changeSong(direction) {
            currentSongIndex += direction;
            if (currentSongIndex >= playlist.length) currentSongIndex = 0;
            if (currentSongIndex < 0) currentSongIndex = playlist.length - 1;
            
            ytPlayer.loadVideoById(playlist[currentSongIndex].id);
            updatePlayerUI();
            
            // Icon auf Pause setzen, da Video lädt/spielt
            document.querySelector('#play-pause-btn i').className = 'fas fa-pause';
        }

        function updatePlayerUI() {
            document.getElementById('yt-title').innerText = playlist[currentSongIndex].title;
            document.getElementById('yt-artist').innerText = playlist[currentSongIndex].artist;
            document.getElementById('yt-cover').src = playlist[currentSongIndex].cover;
            document.getElementById('yt-progress').style.width = '0%';
        }

        function onPlayerStateChange(event) {
            // Wenn der Song vorbei ist, automatisch den nächsten spielen
            if (event.data === YT.PlayerState.ENDED) {
                changeSong(1); 
            }
        }


        // --- 2. SUPABASE LOGIK (PLATZHALTER) ---
        // Hier kommt später dein Supabase Config Script rein, um die Daten live zu ziehen!
        // Beispiel: const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');
    </script>
</body>
</html>
