<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vengeance | Admin Panel</title>
    <style>
        :root {
            --bg-color: #09090b; --card-bg: #18181b; --accent-color: #a855f7;
            --text-color: #f4f4f5; --text-muted: #a1a1aa; --input-bg: #27272a; --border-color: #3f3f46;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; padding: 2rem; }
        .wrapper { width: 100%; max-width: 1000px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #27272a; padding-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        input[type="text"], textarea, select { width: 100%; padding: 0.75rem; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: white; margin-bottom: 1rem; font-size: 0.9rem; }
        input:focus, textarea:focus { border-color: var(--accent-color); outline: none; }
        
        /* Farb-Input Styling */
        .color-picker-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
        .color-box { text-align: center; }
        .color-box input[type="color"] { width: 100%; height: 40px; border: 1px solid var(--border-color); border-radius: 8px; background: none; cursor: pointer; }

        /* Slider Styling */
        .slider-group { margin-bottom: 1rem; }
        .slider-row { display: flex; align-items: center; gap: 15px; }
        .slider-row input[type="range"] { flex: 1; accent-color: var(--accent-color); }
        .slider-value { width: 40px; text-align: right; font-size: 0.9rem; color: var(--accent-color); font-weight: bold; }

        /* Switch/Toggle Button Styling */
        .switch-group { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; border: 1px solid rgba(255,255,255,0.05); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #3f3f46; transition: .3s; border-radius: 24px; }
        .slider-toggle:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider-toggle { background-color: var(--accent-color); }
        input:checked + .slider-toggle:before { transform: translateX(20px); }

        button { width: 100%; padding: 0.75rem; background: var(--accent-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        .panel-box { background: var(--card-bg); border: 1px solid #27272a; padding: 1.5rem; border-radius: 14px; margin-bottom: 1.5rem; }
        .panel-box h3 { margin-bottom: 1rem; font-size: 1.1rem; color: var(--accent-color); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; }
        label { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.35rem; }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upload-zone { border: 2px dashed var(--border-color); padding: 1.2rem; border-radius: 12px; text-align: center; background: rgba(39, 39, 42, 0.3); cursor: pointer; position: relative; margin-bottom: 0.5rem; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .preview-status { font-size: 0.75rem; color: #22c55e; display: block; margin-bottom: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .link-row { display: flex; gap: 10px; margin-bottom: 0.75rem; align-items: center; }
        .link-row input { margin-bottom: 0; }
        .remove-btn { background: #ef4444; width: auto; padding: 0.75rem 1rem; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header"><h2>Vengeance Utilities Control Panel</h2></div>

        <div class="grid">
            <div>
                <div class="panel-box">
                    <h3>Profile Data</h3>
                    <label>Anzeigename</label>
                    <input type="text" id="display-name">
                    
                    <label>Bio Beschreibung</label>
                    <textarea id="bio-text" rows="3"></textarea>
                </div>

                <div class="panel-box">
                    <h3>File Settings (Uploads)</h3>
                    <div class="upload-grid">
                        <div>
                            <label>Avatar / Profilbild</label>
                            <div class="upload-zone"><p>📁 Avatar</p><input type="file" id="file-avatar" class="file-input" accept="image/*"></div>
                            <span id="status-avatar" class="preview-status">Unverändert</span>
                        </div>
                        <div>
                            <label>Profile Banner (Hintergrund-Card)</label>
                            <div class="upload-zone"><p>🖼️ Banner</p><input type="file" id="file-banner" class="file-input" accept="image/*"></div>
                            <span id="status-banner" class="preview-status">Unverändert</span>
                        </div>
                    </div>
                    <div class="upload-grid" style="margin-top: 5px;">
                        <div>
                            <label>Hintergrundvideo (.mp4)</label>
                            <div class="upload-zone"><p>🎥 Video</p><input type="file" id="file-video" class="file-input" accept="video/mp4"></div>
                            <span id="status-video" class="preview-status">Unverändert</span>
                        </div>
                        <div>
                            <label>Audio / Song Track (.mp3)</label>
                            <div class="upload-zone"><p>🎵 Audio</p><input type="file" id="file-song" class="file-input" accept="audio/mpeg"></div>
                            <span id="status-song" class="preview-status">Unverändert</span>
                        </div>
                    </div>
                </div>

                <div class="panel-box">
                    <h3>Navigation Links</h3>
                    <div id="links-list-manager"></div>
                    <button id="add-link-btn" style="background: #27272a; border: 1px solid #3f3f46; margin-top: 1rem;">+ Link hinzufügen</button>
                </div>
            </div>

            <div>
                <div class="panel-box">
                    <h3>Cosmetic Theme Settings</h3>
                    
                    <label>Colors</label>
                    <div class="color-picker-group">
                        <div class="color-box"><label>Accent</label><input type="color" id="cfg-accent"></div>
                        <div class="color-box"><label>Background</label><input type="color" id="cfg-bg"></div>
                        <div class="color-box"><label>Text</label><input type="color" id="cfg-text"></div>
                    </div>

                    <div class="slider-group">
                        <label>Card Opacity (Deckkraft)</label>
                        <div class="slider-row"><input type="range" id="cfg-opacity" min="10" max="100" value="65"><span class="slider-value" id="val-opacity">65%</span></div>
                    </div>

                    <div class="slider-group">
                        <label>Card Backdrop Blur (Weichzeichner)</label>
                        <div class="slider-row"><input type="range" id="cfg-blur" min="0" max="40" value="20"><span class="slider-value" id="val-blur">20px</span></div>
                    </div>

                    <div class="slider-group">
                        <label>Card Border Radius (Rundung)</label>
                        <div class="slider-row"><input type="range" id="cfg-radius" min="0" max="40" value="24"><span class="slider-value" id="val-radius">24px</span></div>
                    </div>

                    <div class="slider-group">
                        <label>Background Video Blur</label>
                        <div class="slider-row"><input type="range" id="cfg-bgblur" min="0" max="20" value="0"><span class="slider-value" id="val-bgblur">0px</span></div>
                    </div>

                    <div class="slider-group">
                        <label>Background Video Brightness</label>
                        <div class="slider-row"><input type="range" id="cfg-bright" min="20" max="100" value="100"><span class="slider-value" id="val-bright">100%</span></div>
                    </div>

                    <label style="margin-top: 1.5rem;">Toggles</label>
                    <div class="switch-group"><span>Card Glow Effekt aktivieren</span><label class="switch"><input type="checkbox" id="cfg-glow" checked><span class="slider-toggle"></span></label></div>
                    <div class="switch-group"><span>Hover Animationen erlauben</span><label class="switch"><input type="checkbox" id="cfg-anim" checked><span class="slider-toggle"></span></label></div>
                </div>
                
                <button id="save-btn" style="background: #22c55e;">Save All Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const supabase = createClient("https://pdyrfnbjegsyjmcmbqck.supabase.co", "sb_publishable_XfgU_toGSxKo2eM810q59w_qJt_HAO0");

        let rowId = null, extAvatar = "", extVideo = "", extBanner = "", extSong = "";

        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') !== '123') {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px; color:#ef4444;'>Zugriff verweigert!</h1>";
        } else {
            loadUserData();
        }

        // Live-Anzeige der Slider-Werte
        const bindSlider = (id, targetId, unit) => {
            document.getElementById(id).addEventListener('input', (e) => document.getElementById(targetId).innerText = e.target.value + unit);
        };
        bindSlider('cfg-opacity', 'val-opacity', '%');
        bindSlider('cfg-blur', 'val-blur', 'px');
        bindSlider('cfg-radius', 'val-radius', 'px');
        bindSlider('cfg-bgblur', 'val-bgblur', 'px');
        bindSlider('cfg-bright', 'val-bright', '%');

        // File State Listener
        const bindFile = (id, targetId) => {
            document.getElementById(id).addEventListener('change', (e) => { if(e.target.files[0]) document.getElementById(targetId).innerText = "Bereit: " + e.target.files[0].name; });
        };
        bindFile('file-avatar', 'status-avatar');
        bindFile('file-banner', 'status-banner');
        bindFile('file-video', 'status-video');
        bindFile('file-song', 'status-song');

        document.getElementById('add-link-btn').addEventListener('click', () => createLinkRow('', ''));

        function createLinkRow(name, url) {
            const container = document.getElementById('links-list-manager');
            const row = document.createElement('div'); row.className = "link-row";
            row.innerHTML = `<input type="text" class="link-name" placeholder="Name" value="${name}" style="flex:1;"><input type="text" class="link-url" placeholder="URL" value="${url}" style="flex:2;"><button class="remove-btn">X</button>`;
            row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
            container.appendChild(row);
        }

        async function loadUserData() {
            const { data } = await supabase.from('user_bios').select('*').limit(1).single();
            if (data) {
                rowId = data.id; extAvatar = data.avatar_url || ''; extVideo = data.video_url || ''; extBanner = data.banner_url || ''; extSong = data.song_url || '';
                document.getElementById('display-name').value = data.display_name || '';
                document.getElementById('bio-text').value = data.bio_text || '';
                
                if(extAvatar) document.getElementById('status-avatar').innerText = "Datei auf Server vorhanden";
                if(extBanner) document.getElementById('status-banner').innerText = "Datei auf Server vorhanden";
                if(extVideo) document.getElementById('status-video').innerText = "Datei auf Server vorhanden";
                if(extSong) document.getElementById('status-song').innerText = "Datei auf Server vorhanden";

                document.getElementById('links-list-manager').innerHTML = "";
                (data.products || []).forEach(l => createLinkRow(l.name, l.url));

                // Settings befüllen
                const c = data.settings || {};
                if(c.primary_color) document.getElementById('cfg-accent').value = c.primary_color;
                if(c.background_color) document.getElementById('cfg-bg').value = c.background_color;
                if(c.text_color) document.getElementById('cfg-text').value = c.text_color;
                if(c.opacity) { document.getElementById('cfg-opacity').value = c.opacity; document.getElementById('val-opacity').innerText = c.opacity + '%'; }
                if(c.blur) { document.getElementById('cfg-blur').value = c.blur; document.getElementById('val-blur').innerText = c.blur + 'px'; }
                if(c.border_radius) { document.getElementById('cfg-radius').value = c.border_radius; document.getElementById('val-radius').innerText = c.border_radius + 'px'; }
                if(c.background_blur) { document.getElementById('cfg-bgblur').value = c.background_blur; document.getElementById('val-bgblur').innerText = c.background_blur + 'px'; }
                if(c.background_brightness) { document.getElementById('cfg-bright').value = c.background_brightness; document.getElementById('val-bright').innerText = c.background_brightness + '%'; }
                document.getElementById('cfg-glow').checked = c.glow !== false;
                document.getElementById('cfg-anim').checked = c.animations !== false;
            }
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            document.getElementById('save-btn').innerText = "Speichere High-End Konfiguration...";
            document.getElementById('save-btn').disabled = true;

            const uploadFile = async (inputElement, existingUrl, prefix) => {
                const file = inputElement.files[0]; if (!file) return existingUrl;
                const name = `${prefix}_${Date.now()}.${file.name.split('.').pop()}`;
                const { error } = await supabase.storage.from('media').upload(name, file);
                return !error ? `https://pdyrfnbjegsyjmcmbqck.supabase.co/storage/v1/object/public/media/${name}` : existingUrl;
            };

            const avatarUrl = await uploadFile(document.getElementById('file-avatar'), extAvatar, 'avatar');
            const bannerUrl = await uploadFile(document.getElementById('file-banner'), extBanner, 'banner');
            const videoUrl = await uploadFile(document.getElementById('file-video'), extVideo, 'video');
            const songUrl = await uploadFile(document.getElementById('file-song'), extSong, 'song');

            const customLinks = [];
            document.querySelectorAll('.link-row').forEach(row => {
                const name = row.querySelector('.link-name').value.trim();
                const url = row.querySelector('.link-url').value.trim();
                if(name && url) customLinks.push({ name, url });
            });

            const configJson = {
                primary_color: document.getElementById('cfg-accent').value,
                background_color: document.getElementById('cfg-bg').value,
                text_color: document.getElementById('cfg-text').value,
                opacity: document.getElementById('cfg-opacity').value,
                blur: document.getElementById('cfg-blur').value,
                border_radius: document.getElementById('cfg-radius').value,
                background_blur: document.getElementById('cfg-bgblur').value,
                background_brightness: document.getElementById('cfg-bright').value,
                glow: document.getElementById('cfg-glow').checked,
                animations: document.getElementById('cfg-anim').checked
            };

            const updates = {
                display_name: document.getElementById('display-name').value,
                bio_text: document.getElementById('bio-text').value,
                avatar_url: avatarUrl, banner_url: bannerUrl, video_url: videoUrl, song_url: songUrl,
                products: customLinks, settings: configJson, updated_at: new Date()
            };

            const { error } = rowId 
                ? await supabase.from('user_bios').update(updates).eq('id', rowId)
                : await supabase.from('user_bios').insert([updates]);

            document.getElementById('save-btn').innerText = "Save All Changes";
            document.getElementById('save-btn').disabled = false;

            if (error) alert('Fehler: ' + error.message);
            else { alert('High-End Konfiguration gespeichert!'); loadUserData(); }
        });
    </script>
</body>
</html>
