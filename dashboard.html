<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vengeance | Admin Panel</title>
    <!-- CSS von oben bleibt gleich... -->
</head>
<body>
    <div class="wrapper">
        <div id="dash-section">
            <h2>Vengeance Admin Panel</h2>
            <!-- Deine Felder... -->
            <button id="save-btn">Save Changes</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const supabase = createClient("https://pdyrfnbjegsyjmcmbqck.supabase.co", "sb_publishable_XfgU_toGSxKo2eM810q59w_qJt_HAO0");

        // Admin-Check
        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') !== '123') {
            document.body.innerHTML = "<h1>Zugriff verweigert!</h1>";
        } else {
            // Lade Daten sofort, da wir kein Login mehr brauchen
            loadUserData();
        }

        async function loadUserData() {
            const { data } = await supabase.from('user_bios').select('*').limit(1).single();
            if (data) {
                document.getElementById('display-name').value = data.display_name || '';
                // ... restliche Felder
            }
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            // Speichern-Logik ohne Auth...
        });
    </script>
</body>
</html>
