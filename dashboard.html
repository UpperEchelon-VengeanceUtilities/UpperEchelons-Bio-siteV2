<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Vengeance | Admin Panel</title>
    <style>
        :root {
            --bg-color: #09090b; --card-bg: #18181b; --accent-color: #a855f7;
            --text-color: #f4f4f5; --text-muted: #a1a1aa; --input-bg: #27272a; --border-color: #3f3f46;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; min-height: 100vh; padding: 2rem; }
        .wrapper { width: 100%; max-width: 950px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid #27272a; padding-bottom: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        input, textarea { width: 100%; padding: 0.75rem; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; color: white; margin-bottom: 1rem; font-size: 0.9rem; }
        input:focus, textarea:focus { border-color: var(--accent-color); outline: none; }
        
        button { width: 100%; padding: 0.75rem; background: var(--accent-color); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }

        .panel-box { background: var(--card-bg); border: 1px solid #27272a; padding: 1.5rem; border-radius: 14px; margin-bottom: 1.5rem; }
        .panel-box h3 { margin-bottom: 1rem; font-size: 1.1rem; color: var(--accent-color); }
        label { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 0.35rem; }

        .upload-zone { border: 2px dashed var(--border-color); padding: 1.5rem; border-radius: 12px; text-align: center; background: rgba(39, 39, 42, 0.3); cursor: pointer; position: relative; margin-bottom: 1rem; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .preview-status { font-size: 0.8rem; color: #22c55e; margin-top: -0.5rem; margin-bottom: 1rem; display: block; }

        /* Link-Manager UI */
        .link-row { display: flex; gap: 10px; margin-bottom: 0.75rem; align-items: center; }
        .link-row input { margin-bottom: 0; }
        .remove-btn { background: #ef4444; width: auto; padding: 0.75rem 1rem; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header"><h2>Vengeance Utilities Dashboard</h2></div>

        <div class="grid">
            <div>
                <div class="panel-box">
                    <h3>General Settings</h3>
                    <label>Anzeigename</label>
                    <input type="text" id="display-name">
                    
                    <label>Bio Beschreibung</label>
                    <textarea id="bio-text" rows="3"></textarea>
                </div>

                <div class="panel-box">
                    <h3>Media Uploads</h3>
                    <label>Profilbild / Web-Icon</label>
                    <div class="upload-zone"><p>📁 Bild auswählen</p><input type="file" id="file-avatar" class="file-input" accept="image/*"></div>
                    <span id="status-avatar" class="preview-status">Keine Datei ausgewählt</span>

                    <label>Hintergrundvideo (.mp4)</label>
                    <div class="upload-zone"><p>🎥 Video auswählen (Max 50MB)</p><input type="file" id="file-video" class="file-input" accept="video/mp4"></div>
                    <span id="status-video" class="preview-status">Keine Datei ausgewählt</span>
                </div>
                
                <button id="save-btn">Save Changes</button>
            </div>

            <div>
                <div class="panel-box">
                    <h3>Custom Navigation Links</h3>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem;">Erstelle unendlich viele Buttons für deine Seite.</p>
                    
                    <div id="links-list-manager"></div>
                    <button id="add-link-btn" style="background: #27272a; border: 1px solid #3f3f46; margin-top: 1rem;">+ Neuen Link hinzufügen</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const supabase = createClient("https://pdyrfnbjegsyjmcmbqck.supabase.co", "sb_publishable_XfgU_toGSxKo2eM810q59w_qJt_HAO0");

        let rowId = null, existingAvatarUrl = "", existingVideoUrl = "";

        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') !== '123') {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px; color:#ef4444;'>Zugriff verweigert!</h1>";
        } else {
            loadUserData();
        }

        document.getElementById('file-avatar').addEventListener('change', (e) => {
            if(e.target.files[0]) document.getElementById('status-avatar').innerText = "Bereit: " + e.target.files[0].name;
        });
        document.getElementById('file-video').addEventListener('change', (e) => {
            if(e.target.files[0]) document.getElementById('status-video').innerText = "Bereit: " + e.target.files[0].name;
        });

        // Link hinzufügen im Manager
        document.getElementById('add-link-btn').addEventListener('click', () => {
            createLinkRow('', '');
        });

        function createLinkRow(name, url) {
            const container = document.getElementById('links-list-manager');
            const row = document.createElement('div');
            row.className = "link-row";
            row.innerHTML = `
                <input type="text" class="link-name" placeholder="z.B. Discord" value="${name}" style="flex:1;">
                <input type="text" class="link-url" placeholder="z.B. discord.gg/..." value="${url}" style="flex:2;">
                <button class="remove-btn">X</button>
            `;
            row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
            container.appendChild(row);
        }

        async function loadUserData() {
            const { data } = await supabase.from('user_bios').select('*').limit(1).single();
            if (data) {
                rowId = data.id; existingAvatarUrl = data.avatar_url || ''; existingVideoUrl = data.video_url || '';
                document.getElementById('display-name').value = data.display_name || '';
                document.getElementById('bio-text').value = data.bio_text || '';
                
                if(existingAvatarUrl) document.getElementById('status-avatar').innerText = "Bild vorhanden";
                if(existingVideoUrl) document.getElementById('status-video').innerText = "Video vorhanden";

                // Bestehende Links rendern
                document.getElementById('links-list-manager').innerHTML = "";
                (data.products || []).forEach(l => createLinkRow(l.name, l.url));
            }
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const avatarFile = document.getElementById('file-avatar').files[0];
            const videoFile = document.getElementById('file-video').files[0];
            
            document.getElementById('save-btn').innerText = "Wird gespeichert...";
            document.getElementById('save-btn').disabled = true;

            let finalAvatarUrl = existingAvatarUrl, finalVideoUrl = existingVideoUrl;

            if (avatarFile) {
                const fileName = `avatar_${Date.now()}.${avatarFile.name.split('.').pop()}`;
                const { error } = await supabase.storage.from('media').upload(fileName, avatarFile);
                if (!error) finalAvatarUrl = `https://pdyrfnbjegsyjmcmbqck.supabase.co/storage/v1/object/public/media/${fileName}`;
            }

            if (videoFile) {
                const fileName = `video_${Date.now()}.${videoFile.name.split('.').pop()}`;
                const { error } = await supabase.storage.from('media').upload(fileName, videoFile);
                if (!error) finalVideoUrl = `https://pdyrfnbjegsyjmcmbqck.supabase.co/storage/v1/object/public/media/${fileName}`;
            }

            // Links aus dem Manager auslesen
            const customLinks = [];
            document.querySelectorAll('.link-row').forEach(row => {
                const name = row.querySelector('.link-name').value.trim();
                const url = row.querySelector('.link-url').value.trim();
                if(name && url) customLinks.push({ name, url });
            });

            const updates = {
                display_name: document.getElementById('display-name').value,
                bio_text: document.getElementById('bio-text').value,
                avatar_url: finalAvatarUrl,
                video_url: finalVideoUrl,
                products: customLinks, // Speichert das Array direkt in Supabase
                updated_at: new Date()
            };

            let error;
            if (rowId) {
                const { error: err } = await supabase.from('user_bios').update(updates).eq('id', rowId); error = err;
            } else {
                const { error: err } = await supabase.from('user_bios').insert([updates]); error = err;
            }

            document.getElementById('save-btn').innerText = "Save Changes";
            document.getElementById('save-btn').disabled = false;

            if (error) alert('Fehler: ' + error.message);
            else { alert('Erfolgreich gespeichert!'); loadUserData(); }
        });
    </script>
</body>
</html>
