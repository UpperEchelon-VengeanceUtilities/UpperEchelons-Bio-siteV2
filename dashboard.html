<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vengeance OS - Admin Control</title>
    
    <!-- Tab Icon (Favicon) für das Dashboard: Ein rot/oranger Zahnrad-Control-Key -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚙️</text></svg>">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0f0f11; 
            --panel-bg: #161619; 
            --border-color: rgba(255,255,255,0.06);
            --input-bg: #1e1e22; 
            --text-light: #f3f4f6; 
            --text-gray: #9ca3af; 
            --accent: #7c3aed;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; min-height: 100vh; }
        
        .sidebar { width: 260px; background-color: var(--panel-bg); border-right: 1px solid var(--border-color); padding: 24px; display: flex; flex-direction: column; gap: 30px; }
        .logo { font-size: 1.2rem; font-weight: bold; color: var(--text-light); display: flex; align-items: center; gap: 10px; }
        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: var(--text-gray); cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .nav-item.active, .nav-item:hover { color: var(--text-light); background: rgba(255,255,255,0.04); }
        
        .main-workspace { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .admin-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 25px; }
        .card-title { font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; color: var(--text-gray); margin-bottom: 6px; }
        input[type="text"], textarea { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px 14px; color: var(--text-light); font-size: 0.9rem; outline: none; }
        input:focus, textarea:focus { border-color: var(--accent); }
        .btn-save { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 10px; }
        .list-info { display: flex; align-items: center; gap: 12px; }
        .list-thumb { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; border: 1px solid rgba(255,255,255,0.05); }
        .btn-delete { background: none; border: none; color: var(--text-gray); cursor: pointer; font-size: 1rem; transition: color 0.2s; }
        .btn-delete:hover { color: var(--danger); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fas fa-terminal" style="color: var(--accent);"></i> Vengeance OS</div>
        <ul class="nav-list">
            <li class="nav-item active" data-target="tab-profile"><i class="fas fa-user-cog"></i> Profile Settings</li>
            <li class="nav-item" data-target="tab-links"><i class="fas fa-link"></i> Link Manager</li>
            <li class="nav-item" data-target="tab-stats"><i class="fas fa-chart-bar"></i> Stats Adjuster</li>
            <li class="nav-item" data-target="tab-youtube"><i class="fab fa-youtube"></i> YouTube Player</li>
            <li class="nav-item" data-target="tab-discord"><i class="fab fa-discord"></i> Discord Config</li>
        </ul>
    </div>

    <div class="main-workspace">
        <div class="header">
            <h2>Dashboard Control Center</h2>
            <div id="db-status" style="font-size: 0.85rem; color: #e11d48;"><i class="fas fa-database"></i> Connecting...</div>
        </div>

        <!-- TAB 1: PROFILE -->
        <div id="tab-profile" class="tab-content active">
            <div class="admin-card" style="max-width: 600px;">
                <div class="card-title"><i class="fas fa-id-card"></i> Main Profile Details</div>
                <form id="profile-form">
                    <div class="form-group"><label>Username</label><input type="text" id="input-username"></div>
                    <div class="form-group"><label>Avatar URL</label><input type="text" id="input-avatar"></div>
                    <div class="form-group"><label>Bio</label><textarea id="input-bio" rows="4"></textarea></div>
                    <button type="submit" class="btn-save">Update Profile</button>
                </form>
            </div>
        </div>

        <!-- TAB 2: LINKS -->
        <div id="tab-links" class="tab-content">
            <div class="admin-card" style="max-width: 600px;">
                <div class="card-title"><i class="fas fa-plus-circle"></i> Add New Social Link</div>
                <form id="link-form">
                    <div class="form-group"><label>Link Name</label><input type="text" id="link-name" required></div>
                    <div class="form-group"><label>URL</label><input type="text" id="link-url" required></div>
                    <div class="form-group"><label>FontAwesome Icon Class (z.B. fab fa-github)</label><input type="text" id="link-icon" value="fas fa-link"></div>
                    <button type="submit" class="btn-save"><i class="fas fa-plus"></i> Add Link</button>
                </form>
            </div>
            <div class="admin-card" style="max-width: 600px;">
                <div class="card-title"><i class="fas fa-list"></i> Current Links</div>
                <div id="dashboard-links-list"></div>
            </div>
        </div>

        <!-- TAB 3: STATS -->
        <div id="tab-stats" class="tab-content">
            <div class="admin-card" style="max-width: 600px;">
                <div class="card-title"><i class="fas fa-sort-numeric-up-alt"></i> Grid Statistics</div>
                <form id="stats-form">
                    <div class="form-group"><label>Years Coding</label><input type="text" id="stat-val-1"></div>
                    <div class="form-group"><label>Coding Languages</label><input type="text" id="stat-val-2"></div>
                    <div class="form-group"><label>Projects Built</label><input type="text" id="stat-val-3"></div>
                    <div class="form-group"><label>Profile Views No manual overrite!</label><input type="text" id="stat-val-4"></div>
                    <button type="submit" class="btn-save">Save Stats</button>
                </form>
            </div>
        </div>

        <!-- TAB 4: YOUTUBE -->
        <div id="tab-youtube" class="tab-content">
            <div class="admin-card" style="max-width: 600px;">
                <div class="card-title"><i class="fab fa-youtube"></i> Manage YouTube Playlist</div>
                <form id="youtube-form">
                    <div class="form-group"><label>Song Title</label><input type="text" id="yt-input-title" required></div>
                    <div class="form-group"><label>Artist</label><input type="text" id="yt-input-artist" required></div>
                    <div class="form-group"><label>YouTube URL oder Video ID</label><input type="text" id="yt-input-id" placeholder="ID oder vollständigen Link reinkopieren" required></div>
                    <button type="submit" class="btn-save">Add Song to DB</button>
                </form>
            </div>
            <div class="admin-card" style="max-width: 600px;">
                <div class="card-title"><i class="fas fa-music"></i> Current Playlist Entries</div>
                <div id="dashboard-playlist-list"></div>
            </div>
        </div>

        <!-- TAB 5: DISCORD -->
        <div id="tab-discord" class="tab-content">
            <div class="admin-card" style="max-width: 600px;">
                <div class="card-title"><i class="fab fa-discord"></i> Discord Integration</div>
                <form id="discord-form">
                    <div class="form-group"><label>Personal Discord ID (Lanyard API)</label><input type="text" id="discord-user-id"></div>
                    <div class="form-group"><label>Discord Server ID (Widget API)</label><input type="text" id="discord-server-id"></div>
                    <button type="submit" class="btn-save">Save Discord Settings</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pdyrfnbjegsyjmcmbqck.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XfgU_toGSxKo2eM810q59w_qJt_HAO0';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if(sbClient) {
            const dbStatus = document.getElementById('db-status');
            dbStatus.style.color = '#22c55e';
            dbStatus.innerHTML = '<i class="fas fa-database"></i> Connected to Supabase';
        }

        // --- TAB NAVIGATION ---
        const navItems = document.querySelectorAll('.nav-item');
        const tabContents = document.querySelectorAll('.tab-content');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                tabContents.forEach(tab => tab.classList.remove('active'));
                item.classList.add('active');
                document.getElementById(item.getAttribute('data-target')).classList.add('active');
            });
        });

        // --- FETCH DB ON LOAD ---
        async function loadDashboardData() {
            try {
                const { data: profile } = await sbClient.from('profile').select('*').eq('id', 1).maybeSingle();
                if (profile) {
                    document.getElementById('input-username').value = profile.username || '';
                    document.getElementById('input-avatar').value = profile.avatar_url || '';
                    document.getElementById('input-bio').value = profile.bio || '';
                }
                const { data: stats } = await sbClient.from('stats').select('*').eq('id', 1).maybeSingle();
                if (stats) {
                    document.getElementById('stat-val-1').value = stats.years_coding || '';
                    document.getElementById('stat-val-2').value = stats.languages || '';
                    document.getElementById('stat-val-3').value = stats.projects || '';
                    document.getElementById('stat-val-4').value = stats.views || 0;
                }
                const { data: discord } = await sbClient.from('discord_config').select('*').eq('id', 1).maybeSingle();
                if (discord) {
                    document.getElementById('discord-user-id').value = discord.user_id || '';
                    document.getElementById('discord-server-id').value = discord.server_id || '';
                }
                loadLinksList();
                loadPlaylistEntries();
            } catch (err) { console.error(err); }
        }

        // --- LINK MANAGER ---
        async function loadLinksList() {
            const container = document.getElementById('dashboard-links-list');
            container.innerHTML = 'Loading...';
            const { data: links } = await sbClient.from('links').select('*');
            if(!links || links.length === 0) {
                container.innerHTML = '<p style="color:var(--text-gray); font-size:0.9rem;">Keine Links vorhanden.</p>'; return;
            }
            container.innerHTML = '';
            links.forEach(link => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="link-info"><i class="${link.icon}"></i><div><strong>${link.name}</strong><div style="font-size:0.75rem;color:var(--text-gray);">${link.url}</div></div></div>
                    <button class="btn-delete" onclick="deleteLink(${link.id})"><i class="fas fa-trash"></i></button>`;
                container.appendChild(div);
            });
        }

        document.getElementById('link-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await sbClient.from('links').insert([{
                name: document.getElementById('link-name').value,
                url: document.getElementById('link-url').value,
                icon: document.getElementById('link-icon').value
            }]);
            document.getElementById('link-form').reset(); document.getElementById('link-icon').value = 'fas fa-link';
            loadLinksList();
        });

        window.deleteLink = async (id) => {
            if(confirm('Link löschen?')) { await sbClient.from('links').delete().eq('id', id); loadLinksList(); }
        };

        // --- PLAYLIST LOGIK ---
        async function loadPlaylistEntries() {
            const container = document.getElementById('dashboard-playlist-list');
            container.innerHTML = 'Loading...';
            const { data: tracks, error } = await sbClient.from('youtube_playlist').select('*');
            if(error) { container.innerHTML = 'Fehler beim Laden.'; return; }
            if(!tracks || tracks.length === 0) {
                container.innerHTML = '<p style="color:var(--text-gray); font-size:0.9rem;">Die Playlist ist aktuell leer.</p>'; return;
            }
            container.innerHTML = '';
            tracks.forEach(track => {
                const div = document.createElement('div');
                div.className = 'list-item';
                const thumbUrl = track.cover_url || `https://img.youtube.com/vi/${track.youtube_id}/hqdefault.jpg`;
                div.innerHTML = `
                    <div class="list-info">
                        <img class="list-thumb" src="${thumbUrl}" alt="Cover">
                        <div>
                            <strong>${track.song_title}</strong>
                            <div style="font-size:0.75rem;color:var(--text-gray);">${track.artist} &bull; ID: ${track.youtube_id}</div>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTrack(${track.id})"><i class="fas fa-trash"></i></button>`;
                container.appendChild(div);
            });
        }

        window.deleteTrack = async (id) => {
            if(confirm('Song wirklich aus der Playlist löschen?')) {
                const { error } = await sbClient.from('youtube_playlist').delete().eq('id', id);
                if(error) alert('Fehler: ' + error.message);
                loadPlaylistEntries();
            }
        };

        // --- SAVE ACTIONS ---
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await sbClient.from('profile').update({
                username: document.getElementById('input-username').value,
                avatar_url: document.getElementById('input-avatar').value,
                bio: document.getElementById('input-bio').value
            }).eq('id', 1);
            alert('Profil aktualisiert! 🔥');
        });

        document.getElementById('stats-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await sbClient.from('stats').update({
                years_coding: document.getElementById('stat-val-1').value,
                languages: document.getElementById('stat-val-2').value,
                projects: document.getElementById('stat-val-3').value,
                views: parseInt(document.getElementById('stat-val-4').value) || 0
            }).eq('id', 1);
            alert('Statistiken gespeichert! 📊');
        });

        document.getElementById('youtube-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            let rawIdInput = document.getElementById('yt-input-id').value.trim();
            let videoId = rawIdInput;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/|live\/)([^#\&\?]*).*/;
            const match = rawIdInput.match(regExp);
            if (match && match[2].length === 11) {
                videoId = match[2];
            } else {
                videoId = videoId.split('?')[0].split('&')[0];
            }

            if (videoId.length !== 11) {
                alert('Ungültige YouTube-URL oder Video-ID! Die ID muss exakt 11 Zeichen lang sein.');
                return;
            }

            const maxResUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
            const hqResUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

            const checkImageExists = (url) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        if (img.naturalWidth === 120) resolve(false);
                        else resolve(true);
                    };
                    img.onerror = () => resolve(false);
                    img.src = url;
                });
            };

            const hasMaxRes = await checkImageExists(maxResUrl);
            const finalCoverUrl = hasMaxRes ? maxResUrl : hqResUrl;

            const { error } = await sbClient.from('youtube_playlist').insert([{
                song_title: document.getElementById('yt-input-title').value,
                artist: document.getElementById('yt-input-artist').value,
                youtube_id: videoId,
                cover_url: finalCoverUrl
            }]);
            
            if(!error) { 
                alert('Song hinzugefügt! Das Cover wurde validiert und gespeichert. 🎧'); 
                document.getElementById('youtube-form').reset(); 
                loadPlaylistEntries(); 
            } else { alert(error.message); }
        });

        document.getElementById('discord-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await sbClient.from('discord_config').update({
                user_id: document.getElementById('discord-user-id').value,
                server_id: document.getElementById('discord-server-id').value
            }).eq('id', 1);
            alert('Discord-Config gesichert!? 💬');
        });

        window.addEventListener('DOMContentLoaded', loadDashboardData);
    </script>
</body>
</html>
